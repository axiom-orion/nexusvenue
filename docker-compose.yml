services:
  neo4j:
    image: neo4j:5.26
    container_name: nexusvenue-neo4j
    ports:
      - "7474:7474" # browser
      - "7687:7687" # bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-nexusvenue}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24

volumes:
  neo4j_data:
